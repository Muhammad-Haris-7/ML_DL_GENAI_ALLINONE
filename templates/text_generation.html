{% extends "base.html" %}

{% block title %}
Text Generation
{% endblock %}

{% block content %}

<h2>AI Text Generation</h2>

<form method="POST">

    <div class="mb-3">

        <label class="form-label">
            Enter Prompt
        </label>

        <textarea
            name="prompt"
            class="form-control"
            rows="4"
            required></textarea>

    </div>

    <button
        type="submit"
        class="btn btn-primary">

        Generate Text

    </button>

</form>

{% if generated_text %}

<hr>

<h4>Generated Text</h4>

<div class="card p-3">

    {{ generated_text }}

</div>

{% endif %}

{% endblock %}
